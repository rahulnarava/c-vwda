alpha: 0.2
batch_size: 256
actor_lr: 0.0003
critic_lr: 0.0003
gamma: 0.99

state_dim: 17
action_dim: 3
hidden_sizes: 256
max_action: 1

gaussian_noise_std: 1.0

# C-VWDA specific
weight_clip: 10.0          # W  – importance-weight log-clip bound
constraint_budget: 1.0     # ε  – constraint budget (user-specified)
dual_step_size: 0.0003     # η_λ – Lagrange multiplier step size
warmup_steps: 10000        # pure-SAC warmup before classifiers activate

temperature_opt: False

tau: 0.005
update_interval: 2
expl_noise: 0.2

eval_episode: 10
eval_freq: 10000
start_steps: 5000
max_step: 1000000
tar_env_interact_freq: 10  # K_cls – classifier update period

device: cuda

save_freq: 5000
