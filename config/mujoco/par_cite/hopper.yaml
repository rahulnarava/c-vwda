# PAR-CITE config for Hopper (Mujoco)
# Inherits all PAR hyperparameters; adds CITE-specific keys.

ac_gradient_clip: 100
alpha: 0.2
batch_size: 128
actor_lr: 0.0003
critic_lr: 0.0003
gamma: 0.99
max_epochs_since_update_decay_interval: 150000.0

state_dim: 11
action_dim: 3
hidden_sizes: 256
max_action: 1

temperature_opt: False

tau: 0.005
update_interval: 2
expl_noise: 0.2

eval_episode: 10
eval_freq: 10000
start_steps: 5000
max_step: 1000000
tar_env_interact_freq: 10

device: cuda

save_freq: 5000

# ── PAR hyperparameter ────────────────────────────────────────────────────
beta: 0.1
entropy_backup: True

# ── CITE hyperparameters ─────────────────────────────────────────────────
# cite_z_dim        : embedding dim of CITE transition encoder
# cite_queue_size   : number of memory slots per queue (src / tar)
# cite_momentum     : EMA momentum for key encoder update
# cite_temperature  : InfoNCE softmax temperature
# cite_coeff        : weight of intrinsic bonus added to tar_reward
# cite_update_freq  : update CITE encoder every N training steps
cite_z_dim: 128
cite_queue_size: 4096
cite_momentum: 0.995
cite_temperature: 0.07
cite_coeff: 0.05
cite_update_freq: 1
