# PAR-CITE config for HalfCheetah (Mujoco)

ac_gradient_clip: 100
alpha: 0.2
batch_size: 128
actor_lr: 0.0003
critic_lr: 0.0003
gamma: 0.99
max_epochs_since_update_decay_interval: 150000.0

state_dim: 17
action_dim: 6
hidden_sizes: 256
max_action: 1

temperature_opt: False

tau: 0.005
update_interval: 2
expl_noise: 0.2

eval_episode: 10
eval_freq: 10000
start_steps: 5000
max_step: 1000000
tar_env_interact_freq: 10

device: cuda

save_freq: 5000

# ── PAR hyperparameter ────────────────────────────────────────────────────
beta: 0.1
entropy_backup: True

# ── CITE hyperparameters ─────────────────────────────────────────────────
cite_z_dim: 128
cite_queue_size: 4096
cite_momentum: 0.995
cite_temperature: 0.07
cite_coeff: 0.05
cite_update_freq: 1
